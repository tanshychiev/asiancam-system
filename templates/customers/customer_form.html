{% extends "base.html" %}
{% block title %}{{ page_title }}{% endblock %}
{% block content %}

<div class="card">
    <div class="card-head">
        <div>
            <h2>{{ page_title }}</h2>
            <p>Customer master data for {{ company.name }}.</p>
        </div>

        <a href="{% url 'customer_center' %}" class="btn btn-light">← Back</a>
    </div>

    <form method="post">
        {% csrf_token %}

        <div class="form-grid">
            {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {{ field.errors }}
            </div>
            {% endfor %}
        </div>

        <div class="form-actions">
            <button class="btn" type="submit">💾 {{ button_text }}</button>
            <a href="{% url 'customer_center' %}" class="btn btn-light">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
